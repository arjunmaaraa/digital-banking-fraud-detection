spring.application.name=fraud-detection-enginedemo
# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/fraud_detection_db
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA CONFIG (for later use)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Enable ANSI colors in the console output
spring.output.ansi.enabled=ALWAYS

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Ensure the docs path is explicit
springdoc.api-docs.path=/v3/api-docs

logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.com.bank.fraud=INFO
